<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMP Rules</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{
  font-family:'Press Start 2P',cursive;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:#e5e7eb;
  padding:20px;
}
.card{
  max-width:760px;
  margin:auto;
  background:#020617;
  padding:24px;
  border-radius:18px;
  border:2px solid #22c55e;
}
ul{font-size:11px;line-height:1.8}
</style>
</head>
<body>

<div class="card">
<h1>📜 SMP Rules</h1>
<ul>
<li>No hacking or cheating</li>
<li>No griefing without permission</li>
<li>Respect all players</li>
<li>No abuse or toxicity</li>
<li>Admins have final say</li>
</ul>
</div>

</body>
</html>
