<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Timings</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{
  font-family:'Press Start 2P',cursive;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:#e5e7eb;
  padding:20px;
}
.card{
  max-width:760px;
  margin:auto;
  background:#020617;
  padding:24px;
  border-radius:18px;
  border:2px solid #22c55e;
}
textarea{
  width:100%;height:200px;background:#020617;color:#e5e7eb;
  border-radius:10px;border:1px solid #334155;padding:10px;
}
button{
  margin-top:15px;width:100%;padding:14px;
  border:none;border-radius:10px;
  background:#22c55e;font-weight:bold;
}
body.mobile textarea{height:260px;font-size:14px}
</style>
</head>
<body>

<div id="deviceModal" style="display:none;position:fixed;inset:0;background:#020617;z-index:9999;align-items:center;justify-content:center;">
  <div style="border:2px solid #22c55e;padding:20px;border-radius:14px;text-align:center;">
    <h3>Select Device</h3><br>
    <button onclick="setDevice('mobile')">📱 Mobile</button><br><br>
    <button onclick="setDevice('pc')">🖥 PC</button>
  </div>
</div>

<div class="card">
<h1>⏰ SMP Timings</h1>

<textarea id="schedule">
Monday | 3:30 PM - 6:00 PM | Any SMP
Tuesday | 3:30 PM - 6:00 PM | Any SMP
Wednesday | 3:30 PM - 6:00 PM | Any SMP
Thursday | 3:30 PM - 6:00 PM | Any SMP
Friday | 3:30 PM - 6:00 PM | Any SMP
Saturday | 3:30 PM - 6:00 PM | Any SMP
Sunday | 11:00 AM - 1:00 PM | Any SMP
</textarea>

<button onclick="generate()">Generate</button>
<div id="result"></div>
</div>

<script>
function setDevice(t){localStorage.setItem("device",t);location.reload();}
function applyDevice(){
  const d=localStorage.getItem("device");
  if(!d){document.getElementById("deviceModal").style.display="flex";return;}
  document.body.classList.add(d);
}
applyDevice();

function getDayIST(){
  const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Kolkata"}));
  if(d.getHours()<6)d.setDate(d.getDate()-1);
  return d.toLocaleString("en-US",{weekday:"long"});
}

function generate(){
  let day=getDayIST();
  if(localStorage.getItem("holiday")==="true")day="Sunday";
  const lines=document.getElementById("schedule").value.split("\n");
  for(let l of lines){
    if(!l.includes("|"))continue;
    const p=l.split("|").map(x=>x.trim());
    if(p[0].toLowerCase()===day.toLowerCase()){
      result.innerHTML=`<h3>${day}</h3><p>${p[1]}</p><p>${p[2]}</p>`;
      return;
    }
  }
  result.innerText="No timing set";
}
</script>
</body>
</html>
