<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMP Timings</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
font-family:'Press Start 2P',cursive;
background:#020617;
color:white;
padding:20px;
}

/* CARD */
.card{
max-width:760px;
margin:auto;
background:#020617;
padding:24px;
border-radius:18px;
border:2px solid #22c55e;
}

/* POPUPS */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
border:2px solid #22c55e;
padding:25px;
border-radius:14px;
text-align:center;
}

button{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#22c55e;
font-weight:bold;
cursor:pointer;
}

textarea{
width:100%;
height:200px;
background:#020617;
color:white;
border:1px solid #334155;
border-radius:10px;
padding:10px;
margin-top:10px;
}

</style>
</head>

<body>

<!-- DEVICE SELECT -->
<div id="deviceModal" class="popup">
<div class="popup-box">
<h3>Select Device</h3>
<button onclick="setDevice('mobile')">📱 Mobile</button>
<button onclick="setDevice('pc')">🖥 PC</button>
</div>
</div>

<!-- SMP SELECT -->
<div id="smpSelector" class="popup">
<div class="popup-box">
<h3>Select SMP</h3>
<button onclick="selectSMP('NightCore SMP')">
NightCore SMP
</button>
</div>
</div>

<div class="card">

<h1>⏰ SMP Timings</h1>

<textarea id="schedule">
Monday | 3:30 PM - 6:00 PM | NightCore SMP
Tuesday | 3:30 PM - 6:00 PM | NightCore SMP
Wednesday | 3:30 PM - 6:00 PM | NightCore SMP
Thursday | 3:30 PM - 6:00 PM | NightCore SMP
Friday | 3:30 PM - 6:00 PM | NightCore SMP
Saturday | 3:30 PM - 6:00 PM | NightCore SMP
Sunday | 11:00 AM - 1:00 PM | NightCore SMP
</textarea>

<button onclick="generate()">Generate Timing</button>

<div id="result">Click Generate</div>

</div>

<script>

/* DEVICE */
function setDevice(type){
localStorage.setItem("device",type);
document.getElementById("deviceModal").style.display="none";
checkSMP();
}

/* SMP */
function selectSMP(name){
localStorage.setItem("selectedSMP",name);
document.getElementById("smpSelector").style.display="none";
}

/* STARTUP FLOW */
window.onload=function(){

const device=localStorage.getItem("device");
const smp=localStorage.getItem("selectedSMP");

if(!device){
document.getElementById("deviceModal").style.display="flex";
return;
}

if(!smp){
document.getElementById("smpSelector").style.display="flex";
}

};

/* IST DAY */
function getDayIST(){
const d=new Date(
new Date().toLocaleString("en-US",{timeZone:"Asia/Kolkata"})
);
if(d.getHours()<6)d.setDate(d.getDate()-1);
return d.toLocaleString("en-US",{weekday:"long"});
}

/* EXAM RANGE */
function examActive(){
const start=localStorage.getItem("examStart");
const end=localStorage.getItem("examEnd");
if(!start||!end)return false;
const today=new Date().toISOString().split("T")[0];
return today>=start&&today<=end;
}

/* GENERATOR */
function generate(){

let day=getDayIST();

if(localStorage.getItem("holiday")==="true")
day="Sunday";

const study=localStorage.getItem("study")==="true";
const exam=examActive();
const smp=localStorage.getItem("selectedSMP");

const lines=document
.getElementById("schedule")
.value.split("\n");

for(let l of lines){

if(!l.includes("|"))continue;

const p=l.split("|").map(x=>x.trim());

if(p[0]===day && p[2]===smp){

let extra="";
if(study)extra+="📖 Exam Study Time Active<br>";
if(exam)extra+="📝 Exams Ongoing<br>";

result.innerHTML=`
<h3>${smp}</h3>
<h2>${day}</h2>
<p>${p[1]}</p>
${extra}
`;
return;
}
}

result.innerText="No timing found";
}

</script>

</body>
</html>
