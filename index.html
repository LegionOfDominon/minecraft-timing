<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft Timing Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Press Start 2P', cursive;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: #e5e7eb;
      padding: 20px;
    }
    .card {
      max-width: 760px;
      margin: auto;
      background: #020617;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 15px 40px rgba(0,0,0,.7);
      border: 2px solid #22c55e;
    }
    h1 {
      text-align: center;
      color: #22c55e;
      margin-bottom: 10px;
    }
    .notice {
      background: #052e16;
      border: 1px dashed #22c55e;
      padding: 12px;
      border-radius: 10px;
      font-size: 10px;
      margin-bottom: 15px;
      text-align: center;
    }
    textarea {
      width: 100%;
      height: 200px;
      background: #020617;
      color: #e5e7eb;
      border-radius: 12px;
      border: 1px solid #334155;
      padding: 12px;
      font-family: monospace;
    }
    button {
      margin-top: 18px;
      padding: 14px 20px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      color: #022c22;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      font-size: 12px;
    }
    .output {
      margin-top: 20px;
      padding: 18px;
      border-radius: 14px;
      background: #020617;
      border: 1px solid #22c55e;
    }
    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 9px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>⛏️ Minecraft Timing</h1>
    <div class="notice">📢 If There Is <b>No School</b>, Then The Timing Of <b>Sunday</b> Will Be Followed</div>
    <textarea id="schedule">
Monday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any SMP
Tuesday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any SMP
Wednesday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any SMP
Thursday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any SMP
Friday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any SMP
Saturday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any SMP
Sunday | 11:00 AM - 1:00 PM | Any SMP
    </textarea>
    <button onclick="generate()">🎮 Generate Today's Timing</button>
    <div class="output" id="result">Click Generate to see today's timing.</div>
    <div class="footer">⏰ Timezone: IST • Updates at 6:00 AM</div>
  </div>
<script>
function getIndiaDayAt6AM() {
  const now = new Date();
  const ist = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Kolkata" }));
  if (ist.getHours() < 6) ist.setDate(ist.getDate() - 1);
  return ist.toLocaleString("en-US", { weekday: "long" });
}
function generate() {
  const lines = document.getElementById("schedule").value.split("\n");
  const today = getIndiaDayAt6AM();
  for (let line of lines) {
    if (!line.includes("|")) continue;
    const parts = line.split("|").map(p => p.trim());
    if (parts[0].toLowerCase() === today.toLowerCase()) {
      document.getElementById("result").innerHTML = `<h2>${today} (IST)</h2><p><b>Time:</b> ${parts[1]}</p><p><b>Server:</b> ${parts[2]}</p>`;
      return;
    }
  }
  document.getElementById("result").innerText = "No timing set for today.";
}
</script>
</body>
</html>
