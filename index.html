<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft SMP Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{
  font-family:'Press Start 2P',cursive;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:#e5e7eb;
  padding:20px;
}
.card{
  max-width:760px;
  margin:auto;
  background:#020617;
  padding:24px;
  border-radius:18px;
  border:2px solid #22c55e;
  text-align:center;
}
a{
  display:block;
  margin:12px 0;
  color:#22c55e;
  text-decoration:none;
  font-size:12px;
}
body.mobile .card{max-width:95%}
</style>
</head>
<body>

<div id="deviceModal" style="display:none;position:fixed;inset:0;background:#020617;z-index:9999;align-items:center;justify-content:center;">
  <div style="border:2px solid #22c55e;padding:20px;border-radius:14px;text-align:center;">
    <h3>Select Device</h3><br>
    <button onclick="setDevice('mobile')">📱 Mobile</button><br><br>
    <button onclick="setDevice('pc')">🖥 PC</button>
  </div>
</div>

<div class="card">
<h1>⛏️ Minecraft SMP Hub</h1>
<a href="timing.html">⏰ Timings</a>
<a href="status.html">🟢 Status</a>
<a href="rules.html">📜 Rules</a>
</div>

<script>
function setDevice(t){localStorage.setItem("device",t);location.reload();}
function applyDevice(){
  const d=localStorage.getItem("device");
  if(!d){document.getElementById("deviceModal").style.display="flex";return;}
  document.body.classList.add(d);
}
applyDevice();
</script>
</body>
</html>
