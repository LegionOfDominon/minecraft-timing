<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft Timing Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      padding: 20px;
    }
    .card {
      max-width: 720px;
      margin: auto;
      background: #020617;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,.5);
    }
    h1 { text-align: center; }
    textarea {
      width: 100%;
      height: 220px;
      background: #020617;
      color: #e5e7eb;
      border-radius: 10px;
      border: 1px solid #334155;
      padding: 10px;
    }
    button {
      margin-top: 15px;
      padding: 12px 18px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      font-weight: bold;
      cursor: pointer;
    }
    .output {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #020617;
      border: 1px solid #334155;
    }
    .small {
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>⛏️ Minecraft Timing</h1>

    <p class="small">Edit timings daily (Admin)</p>

    <textarea id="schedule">
Monday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any SMP
Tuesday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any SMP
Wednesday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any SMP
Thursday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any SMP
Friday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any SMP
Saturday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any SMP
Sunday | 11:00 AM - 1:00 PM | Any SMP
    </textarea>

    <button onclick="generate()">🎮 Generate</button>

    <div class="output" id="result">
      Click Generate to see today's timing.
    </div>
  </div>

<script>
function getIndiaDayAt6AM() {
  const now = new Date();
  const ist = new Date(
    now.toLocaleString("en-US", { timeZone: "Asia/Kolkata" })
  );

  if (ist.getHours() < 6) {
    ist.setDate(ist.getDate() - 1);
  }

  return ist.toLocaleString("en-US", { weekday: "long" });
}

function generate() {
  const text = document.getElementById("schedule").value;
  const lines = text.split("\n");
  const today = getIndiaDayAt6AM();

  for (let line of lines) {
    if (!line.includes("|")) continue;
    const parts = line.split("|").map(p => p.trim());

    if (parts[0].toLowerCase() === today.toLowerCase()) {
      document.getElementById("result").innerHTML = `
        <h2>${today} (IST)</h2>
        <p><strong>Time:</strong> ${parts[1]}</p>
        <p><strong>Server:</strong> ${parts[2]}</p>
      `;
      return;
    }
  }

  document.getElementById("result").innerText =
    "No timing set for today.";
}
</script>

</body>
</html>
