<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft SMP Hub – Timings</title>

  <!-- Minecraft-style font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Press Start 2P', cursive;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: #e5e7eb;
      padding: 20px;
    }

    .card {
      max-width: 780px;
      margin: auto;
      background: #020617;
      padding: 26px;
      border-radius: 18px;
      border: 2px solid #22c55e;
      box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    }

    h1 {
      text-align: center;
      color: #22c55e;
      margin-bottom: 14px;
    }

    nav {
      text-align: center;
      margin-bottom: 20px;
      font-size: 10px;
    }

    nav a {
      color: #22c55e;
      text-decoration: none;
      margin: 0 8px;
    }

    .notice {
      background: #052e16;
      border: 1px dashed #22c55e;
      padding: 14px;
      border-radius: 12px;
      font-size: 10px;
      margin-bottom: 18px;
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 210px;
      background: #020617;
      color: #e5e7eb;
      border-radius: 12px;
      border: 1px solid #334155;
      padding: 12px;
      font-family: monospace;
    }

    button {
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      color: #022c22;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      font-size: 12px;
    }

    button:hover {
      opacity: 0.9;
    }

    .output {
      margin-top: 22px;
      padding: 18px;
      border-radius: 14px;
      background: #020617;
      border: 1px solid #22c55e;
      font-size: 11px;
    }

    .footer {
      text-align: center;
      margin-top: 18px;
      font-size: 9px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>⛏️ Minecraft SMP Hub</h1>

    <nav>
      <a href="index.html">🏠 Home</a> |
      <a href="rules.html">📜 Rules</a> |
      <a href="status.html">🟢 Status</a>
    </nav>

    <div class="notice">
      📢 If there is <b>No School</b>, then the <b>Sunday timing</b> will be followed for all SMPs.
    </div>

    <textarea id="schedule">
Monday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any Registered SMP
Tuesday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any Registered SMP
Wednesday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any Registered SMP
Thursday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any Registered SMP
Friday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any Registered SMP
Saturday | 3:30 PM OR 4:00 PM - 5:00 PM OR 6:00 PM | Any Registered SMP
Sunday | 11:00 AM - 1:00 PM | Any Registered SMP
    </textarea>

    <button onclick="generateTiming()">🎮 Generate Today’s Timing</button>

    <div class="output" id="result">
      Click the button to see today’s SMP timing.
    </div>

    <div class="footer">
      ⏰ Timezone: IST (India) • Day switches at 6:00 AM
    </div>

  </div>

<script>
  // Get current day based on IST and 6:00 AM rule
  function getIndiaDayAt6AM() {
    const now = new Date();
    const ist = new Date(
      now.toLocaleString("en-US", { timeZone: "Asia/Kolkata" })
    );

    if (ist.getHours() < 6) {
      ist.setDate(ist.getDate() - 1);
    }

    return ist.toLocaleString("en-US", { weekday: "long" });
  }

  function generateTiming() {
    const text = document.getElementById("schedule").value;
    const lines = text.split("\n");
    const today = getIndiaDayAt6AM();

    for (let line of lines) {
      if (!line.includes("|")) continue;

      const parts = line.split("|").map(p => p.trim());

      if (parts[0].toLowerCase() === today.toLowerCase()) {
        document.getElementById("result").innerHTML = `
          <h3>📅 ${today} (IST)</h3>
          <p><b>🕒 Time:</b> ${parts[1]}</p>
          <p><b>🎯 SMP:</b> ${parts[2]}</p>
          <p>✅ Share this timing with all players.</p>
        `;
        return;
      }
    }

    document.getElementById("result").innerHTML =
      "<p>❌ No timing set for today.</p>";
  }
</script>

</body>
</html>
