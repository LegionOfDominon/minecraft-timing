<script>
  function getIndiaDayAt6AM() {
    // Get current time in IST (Asia/Kolkata = Bihar time)
    const now = new Date();
    const istNow = new Date(
      now.toLocaleString("en-US", { timeZone: "Asia/Kolkata" })
    );

    // If before 6:00 AM IST, treat as previous day
    if (istNow.getHours() < 6) {
      istNow.setDate(istNow.getDate() - 1);
    }

    return istNow.toLocaleString("en-US", { weekday: "long" });
  }

  function generateTiming() {
    const text = document.getElementById("schedule").value;
    const lines = text.split("\n").filter(l => l.includes("|"));

    const today = getIndiaDayAt6AM();
    let found = false;

    for (let line of lines) {
      const parts = line.split("|").map(p => p.trim());
      if (parts[0].toLowerCase() === today.toLowerCase()) {
        document.getElementById("result").innerHTML = `
          <h2>📅 ${today} (IST)</h2>
          <p><b>🕒 Time:</b> ${parts[1]}</p>
          <p><b>🎯 Mode:</b> ${parts[2]}</p>
          <p>⏰ Schedule updates daily at <b>6:00 AM IST</b></p>
        `;
        found = true;
        break;
      }
    }

    if (!found) {
      document.getElementById("result").innerHTML = `
        <h2>📅 ${today} (IST)</h2>
        <p>❌ No timing set for today.</p>
        <p>Ask admin to update the schedule.</p>
      `;
    }
  }
</script>
