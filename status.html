<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMP Status</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{
  font-family:'Press Start 2P',cursive;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:#e5e7eb;
  padding:20px;
}
.card{
  max-width:760px;
  margin:auto;
  background:#020617;
  padding:24px;
  border-radius:18px;
  border:2px solid #22c55e;
}
nav{
  text-align:center;
  margin-bottom:15px;
}
nav a{
  color:#22c55e;
  margin:0 8px;
  font-size:10px;
  text-decoration:none;
}
h1{text-align:center;color:#22c55e;}
.status{
  padding:15px;
  border-radius:12px;
  border:1px solid #22c55e;
  margin-top:15px;
}
.admin{
  margin-top:20px;
  border-top:1px dashed #334155;
  padding-top:15px;
  font-size:10px;
}
button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
<nav>
  <a href="index.html">Home</a>
  <a href="timing.html">Timings</a>
  <a href="status.html">Status</a>
  <a href="rules.html">Rules</a>
</nav>

<h1>🟢 SMP Status</h1>

<div class="status" id="statusBox">
Checking server status...
</div>

<div class="admin">
<b>Admin Controls</b><br><br>
<label>
<input type="checkbox" id="holidayToggle">
 Today is a Holiday / No School
</label>
<button onclick="saveHoliday()">Save</button>
</div>
</div>

<script>
function loadStatus(){
  const holiday = localStorage.getItem("holiday") === "true";
  document.getElementById("holidayToggle").checked = holiday;

  document.getElementById("statusBox").innerHTML = holiday
    ? "🎉 Holiday Mode ON<br>Sunday timings will be followed."
    : "📚 School Day<br>Normal weekday timings apply.";
}

function saveHoliday(){
  const checked = document.getElementById("holidayToggle").checked;
  localStorage.setItem("holiday", checked);
  loadStatus();
}

loadStatus();
</script>

</body>
</html>
