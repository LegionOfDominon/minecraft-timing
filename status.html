<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMP Status</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{
  font-family:'Press Start 2P',cursive;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:#e5e7eb;
  padding:20px;
  transition:0.3s;
}
.card{
  max-width:760px;
  margin:auto;
  background:#020617;
  padding:24px;
  border-radius:18px;
  border:2px solid #22c55e;
}
button{
  margin-top:12px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}
.admin-panel{
  margin-top:20px;
  padding:15px;
  border:2px solid #22c55e;
  border-radius:12px;
}
.panel-card{
  background:#0f172a;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
}
.status-box{
  margin-top:20px;
  padding:15px;
  border-radius:10px;
  background:#111827;
}
</style>
</head>
<body>

<!-- DEVICE SELECT -->
<div id="deviceModal" style="display:none;position:fixed;inset:0;background:#020617;z-index:9999;align-items:center;justify-content:center;">
  <div style="border:2px solid #22c55e;padding:20px;border-radius:14px;text-align:center;">
    <h3>Select Device</h3><br>
    <button onclick="setDevice('mobile')">📱 Mobile</button><br><br>
    <button onclick="setDevice('pc')">🖥 PC</button>
  </div>
</div>

<div class="card">
<h1>🟢 SMP Status</h1>

<div id="statusBox" class="status-box"></div>

<button onclick="adminLogin()">🔐 Admin Login</button>

<div id="adminPanel" class="admin-panel" style="display:none;">
<h2>Admin Controls</h2>

<div class="panel-card">
<h3>Holiday / No School</h3>
<button onclick="toggleHoliday()">Toggle Holiday</button>
<p id="holidayStatus"></p>
</div>

<div class="panel-card">
<h3>Exam Study Time</h3>
<button onclick="toggleStudy()">Toggle Study</button>
<p id="studyStatus"></p>
</div>

<div class="panel-card">
<h3>Exam Ongoing Dates</h3>
<label>Start:</label>
<input type="date" id="examStart"><br><br>
<label>End:</label>
<input type="date" id="examEnd"><br>
<button onclick="saveExamDates()">Save Dates</button>
<p id="examStatus"></p>
</div>

</div>
</div>

<script>
const ADMIN_PASSWORD="10009000XC";

/* DEVICE */
function setDevice(t){
  localStorage.setItem("device",t);
  location.reload();
}
function applyDevice(){
  const d=localStorage.getItem("device");
  if(!d){
    document.getElementById("deviceModal").style.display="flex";
    return;
  }
  document.body.classList.add(d);
}
applyDevice();

/* ADMIN LOGIN */
function adminLogin(){
  const pass=prompt("Enter Admin Password:");
  if(pass===ADMIN_PASSWORD){
    document.getElementById("adminPanel").style.display="block";
    updateStatus();
  }else alert("Wrong Password");
}

/* TOGGLES */
function toggleHoliday(){
  let s=localStorage.getItem("holiday")==="true";
  localStorage.setItem("holiday",!s);
  refresh();
}
function toggleStudy(){
  let s=localStorage.getItem("study")==="true";
  localStorage.setItem("study",!s);
  refresh();
}
function saveExamDates(){
  const start=document.getElementById("examStart").value;
  const end=document.getElementById("examEnd").value;
  if(start && end){
    localStorage.setItem("examStart",start);
    localStorage.setItem("examEnd",end);
    alert("Exam dates saved");
  }
  refresh();
}

/* STATUS DISPLAY */
function refresh(){
  const holiday=localStorage.getItem("holiday")==="true";
  const study=localStorage.getItem("study")==="true";
  const start=localStorage.getItem("examStart");
  const end=localStorage.getItem("examEnd");

  const today=new Date().toISOString().split("T")[0];
  let examActive=false;

  if(start && end && today>=start && today<=end){
    examActive=true;
  }

  let statusText="";

  if(holiday){
    statusText+="🎉 Holiday Mode Active<br>";
  }else{
    statusText+="📚 Normal School Day<br>";
  }

  if(study){
    statusText+="📖 Study Time Enabled<br>";
  }

  if(examActive){
    statusText+="📝 Exam Ongoing ("+start+" to "+end+")<br>";
  }

  document.getElementById("statusBox").innerHTML=statusText;

  /* Admin panel status */
  document.getElementById("holidayStatus").innerText="Holiday: "+holiday;
  document.getElementById("studyStatus").innerText="Study: "+study;
  document.getElementById("examStatus").innerText=
    start && end ? "Exam from "+start+" to "+end : "No exam set";
}

refresh();
</script>

</body>
</html>
