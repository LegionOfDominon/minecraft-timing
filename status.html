<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMP Status</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{
  font-family:'Press Start 2P',cursive;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:#e5e7eb;
  padding:20px;
}
.card{
  max-width:760px;
  margin:auto;
  background:#020617;
  padding:24px;
  border-radius:18px;
  border:2px solid #22c55e;
}
button{
  margin-top:10px;padding:12px;width:100%;
  border:none;border-radius:10px;background:#22c55e;
}
</style>
</head>
<body>

<div id="deviceModal" style="display:none;position:fixed;inset:0;background:#020617;z-index:9999;align-items:center;justify-content:center;">
  <div style="border:2px solid #22c55e;padding:20px;border-radius:14px;text-align:center;">
    <h3>Select Device</h3><br>
    <button onclick="setDevice('mobile')">📱 Mobile</button><br><br>
    <button onclick="setDevice('pc')">🖥 PC</button>
  </div>
</div>

<div class="card">
<h1>🟢 SMP Status</h1>
<div id="statusBox"></div>

<button onclick="adminLogin()">🔐 Admin Login</button>

<div id="adminPanel" style="display:none;">
<label><input type="checkbox" id="holiday"> Holiday / No School</label>
<button onclick="save()">Save</button>
</div>
</div>

<script>
const PASS="10009000XC";
function adminLogin(){
  if(prompt("Admin Password")==PASS){
    sessionStorage.setItem("admin","1");
    location.reload();
  }else alert("Wrong password");
}
function setDevice(t){localStorage.setItem("device",t);location.reload();}
function applyDevice(){
  const d=localStorage.getItem("device");
  if(!d){deviceModal.style.display="flex";return;}
  document.body.classList.add(d);
}
applyDevice();

function load(){
  const h=localStorage.getItem("holiday")==="true";
  statusBox.innerHTML=h?"🎉 Holiday Mode ON":"📚 Normal School Day";
  if(sessionStorage.getItem("admin")){
    adminPanel.style.display="block";
    holiday.checked=h;
  }
}
function save(){
  localStorage.setItem("holiday",holiday.checked);
  load();
}
load();
</script>
</body>
</html>
